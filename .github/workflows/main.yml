name: ETS Ceylon Radio 24-7
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-radio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Run Radio Script
        env:
          STREAM_URL: ${{ secrets.STREAM_URL }}
        run: python radio.py
